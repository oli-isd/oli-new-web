
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/no-bg.png">
    <title>Ovialand Inc. | Premier Family Living</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              green: {
                50:  '#f0f7e8',
                100: '#daefc4',
                200: '#c1e49c',
                300: '#a4d470',
                400: '#84bb4e',
                500: '#679836',
                600: '#32893b',
                700: '#1f5e29',
                800: '#194d22',
                900: '#133d1a',
              }
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        html {
            scroll-behavior: smooth;
            overflow-y: scroll;
        }
        body {
            font-family: 'Poppins', sans-serif;
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #32893b;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #1f5e29;
        }
        * {
            scrollbar-width: thin;
            scrollbar-color: #32893b #f1f1f1;
        }
        h1, h2, h3, h4, h5, h6, .font-serif {
            font-family: 'Poppins', sans-serif;
        }
        .gold-gradient {
            background: linear-gradient(135deg, #1f5e29 0%, #679836 50%, #32893b 100%);
        }
         :focus-visible {
            outline: 3px solid #32893b;
            outline-offset: 2px;
        }
         @keyframes fadeInSlide {
            0% {
                opacity: 0;
                transform: translateY(30px) scale(0.98);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        .animate-fadeIn {
            animation: fadeInSlide 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }
         @keyframes heroFadeUp {
            0% {
                opacity: 0;
                transform: translateY(28px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .hero-animate {
            opacity: 0;
            animation: heroFadeUp 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
         @keyframes heroFromLeft {
            0% {
                opacity: 0;
                transform: translateX(-60px);
            }
            100% {
                opacity: 1;
                transform: translateX(0);
            }
        }
        @keyframes heroFromRight {
            0% {
                opacity: 0;
                transform: translateX(60px);
            }
            100% {
                opacity: 1;
                transform: translateX(0);
            }
        }
        .hero-from-left {
            opacity: 0;
            animation: heroFromLeft 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        .hero-from-right {
            opacity: 0;
            animation: heroFromRight 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
    </style>
</head>
<body class="bg-white text-slate-900">
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
